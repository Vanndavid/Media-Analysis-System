services:
  app:
    build:
      context: ./backend
      dockerfile: DockerFile.dev
    container_name: video_app
    volumes:
      - ./backend:/var/www/html
      - ./backend/storage:/var/www/html/storage
    networks: [web]
    depends_on: [redis, mysql]
    command: php-fpm
    expose: ["9000"]

  worker:
    build:
      context: ./backend
      dockerfile: DockerFile.dev
    container_name: video_worker
    labels:
      - "traefik.enable=false"  
    volumes:
      - ./backend:/var/www/html
      - ./backend/storage:/var/www/html/storage
    networks: [web]
    depends_on: [redis, mysql]
    command: sh -lc "php artisan queue:work --queue=transcode,default --sleep=1 --tries=1"

  nginx:
    image: nginx:alpine
    container_name: video_nginx
    volumes:
      - ./backend:/var/www/html
      - ./nginx/dev.api.conf:/etc/nginx/conf.d/default.conf:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.videoApi.rule=Host(`api.vms.vanndavidteng.com`)"
      - "traefik.http.routers.videoApi.entrypoints=web,websecure"
      - "traefik.http.routers.videoApi.tls=true"
      - "traefik.http.routers.videoApi.tls.certresolver=letsencrypt"
      - "traefik.http.services.videoApi.loadbalancer.server.port=80"
    networks: [web]
    depends_on: [app]
    expose: ["80"]

  frontend:
    build:
      context: ./frontend
      dockerfile: DockerFile.prod
    container_name: video_frontend
    networks:
      - web
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.video.rule=Host(`vms.vanndavidteng.com`)"
      - "traefik.http.routers.video.entrypoints=web,websecure"
      - "traefik.http.routers.video.tls=true"
      - "traefik.http.routers.video.tls.certresolver=letsencrypt"
      - "traefik.http.services.video.loadbalancer.server.port=80"


  redis:
    image: redis:7-alpine
    container_name: video_redis
    networks: [web]

  mysql:
    image: mysql:8.4
    container_name: video_mysql
    environment:
      MYSQL_DATABASE: media_analysis
      MYSQL_USER: app
      MYSQL_PASSWORD: app
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - mysql_data_prod:/var/lib/mysql
    networks: [web]

networks:
  web:
    external: true

volumes:
  mysql_data_prod:
